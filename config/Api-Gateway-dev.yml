server:
  port: 9070

spring:
  application:
    name: Api-Gateway

  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: order-service
              uri: lb://ORDER-SERVICE
              predicates:
                - Path=/order/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
